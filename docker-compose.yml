
services:
  # ─── PostgreSQL ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nullify}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-nullify}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nullify}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Redis (queue Celery + cache) ────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Security Tools Images (build-only) ─────────────────
  # Built once so the API can `docker run nullify-tools-*:latest`
  tools:
    build:
      context: ./docker
      dockerfile: Dockerfile.tools
    image: nullify-tools:latest
    entrypoint: ["echo", "tools image built"]
    restart: "no"

  tools-network:
    build:
      context: ./docker
      dockerfile: Dockerfile.tools-network
    image: nullify-tools-network:latest
    entrypoint: ["echo", "tools-network image built"]
    restart: "no"

  tools-web:
    build:
      context: ./docker
      dockerfile: Dockerfile.tools-web
    image: nullify-tools-web:latest
    entrypoint: ["echo", "tools-web image built"]
    restart: "no"

  tools-auth:
    build:
      context: ./docker
      dockerfile: Dockerfile.tools-auth
    image: nullify-tools-auth:latest
    entrypoint: ["echo", "tools-auth image built"]
    restart: "no"

  tools-binary:
    build:
      context: ./docker
      dockerfile: Dockerfile.tools-binary
    image: nullify-tools-binary:latest
    entrypoint: ["echo", "tools-binary image built"]
    restart: "no"

  tools-cloud:
    build:
      context: ./docker
      dockerfile: Dockerfile.tools-cloud
    image: nullify-tools-cloud:latest
    entrypoint: ["echo", "tools-cloud image built"]
    restart: "no"

  tools-forensics:
    build:
      context: ./docker
      dockerfile: Dockerfile.tools-forensics
    image: nullify-tools-forensics:latest
    entrypoint: ["echo", "tools-forensics image built"]
    restart: "no"

  tools-osint:
    build:
      context: ./docker
      dockerfile: Dockerfile.tools-osint
    image: nullify-tools-osint:latest
    entrypoint: ["echo", "tools-osint image built"]
    restart: "no"

  tools-browser:
    build:
      context: ./docker
      dockerfile: Dockerfile.tools-browser
    image: nullify-tools-browser:latest
    entrypoint: ["echo", "tools-browser image built"]
    restart: "no"

  # ─── FastAPI Backend ─────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:?Set OPENROUTER_API_KEY in .env}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      DEFAULT_MODEL: ${DEFAULT_MODEL:-anthropic/claude-sonnet-4-5}
      DATABASE_URL: postgresql://${POSTGRES_USER:-nullify}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-nullify}
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: '["http://localhost:3000","http://web:3000"]'
    volumes:
      # Mount Docker socket so the API can launch tool containers
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      tools:
        condition: service_completed_successfully
      tools-network:
        condition: service_completed_successfully
      tools-web:
        condition: service_completed_successfully
      tools-auth:
        condition: service_completed_successfully
      tools-binary:
        condition: service_completed_successfully
      tools-cloud:
        condition: service_completed_successfully
      tools-forensics:
        condition: service_completed_successfully
      tools-osint:
        condition: service_completed_successfully
      tools-browser:
        condition: service_completed_successfully

  # ─── Celery Worker ──────────────────────────────────────
  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    command: celery -A app.celery_app:celery worker --loglevel=info --concurrency=4
    restart: unless-stopped
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:?Set OPENROUTER_API_KEY in .env}
      DATABASE_URL: postgresql://${POSTGRES_USER:-nullify}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-nullify}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      redis:
        condition: service_healthy
      tools:
        condition: service_completed_successfully
      tools-network:
        condition: service_completed_successfully
      tools-web:
        condition: service_completed_successfully
      tools-auth:
        condition: service_completed_successfully
      tools-binary:
        condition: service_completed_successfully
      tools-cloud:
        condition: service_completed_successfully
      tools-forensics:
        condition: service_completed_successfully
      tools-osint:
        condition: service_completed_successfully
      tools-browser:
        condition: service_completed_successfully

volumes:
  pgdata: